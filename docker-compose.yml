services:
  ollama:
    # image: ollama/ollama:rocm
    image: ollama/ollama
    volumes:
      - ollama:/root/.ollama
    environment:
      - OLLAMA_ORIGINS="*"
    ports:
      - 11434:11434
    networks:
      - internal_network

  python:
    build:
      dockerfile: python.dockerfile
    volumes:
      - ./embedding:/home
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - API_HOST=0.0.0.0
    ports:
      - 8000:8000
    networks:
      - internal_network
    depends_on:
      - ollama

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./webpages:/home
    ports:
      - 80:80
      - 8000:8000
      - 11434:11434
    networks:
      - internal_network
      - internet_access
    depends_on:
      - python

volumes:
  ollama:

networks:
  internal_network:
    internal: true
  internet_access:

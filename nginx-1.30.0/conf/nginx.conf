worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include             mime.types;
    default_type        application/octet-stream;
    sendfile            on;
    keepalive_timeout   65;

    server {
        listen      80;
        server_name localhost;

        location / {
            root    ../webpages;
            index   index.html index.htm;
        }
    }

    server {
        listen 8000;
        location / {
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_pass http://172.23.255.4:8000/;
        }
    }

    server {
        listen 11434;
        location / {
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_pass http://172.23.255.4:11434/;
        }
    }
}

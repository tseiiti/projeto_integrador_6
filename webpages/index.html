<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AI Chat</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="index.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                    'primary': '#4F46E5',
                    'primary-dim': '#4338CA',
                    'primary-container': '#E0E7FF',
                    'on-primary': '#FFFFFF',
                    'on-primary-container': '#1E1B4B',
                    'secondary': '#6366F1',
                    'secondary-container': '#EEF2FF',
                    'on-secondary-container': '#312E81',
                    'surface': '#F9FAFB',
                    'surface-dim': '#F3F4F6',
                    'surface-bright': '#FFFFFF',
                    'surface-container-lowest': '#FFFFFF',
                    'surface-container-low': '#F9FAFB',
                    'surface-container': '#F3F4F6',
                    'surface-container-high': '#E5E7EB',
                    'surface-container-highest': '#D1D5DB',
                    'on-surface': '#111827',
                    'on-surface-variant': '#4B5563',
                    'outline': '#9CA3AF',
                    'outline-variant': '#E5E7EB',
                    'background': '#F9FAFB',
                    'on-background': '#111827',
                },
                fontFamily: {
                    'headline': ['Manrope', 'sans-serif'],
                    'body': ['Inter', 'sans-serif'],
                    'label': ['Inter', 'sans-serif']
                },
                borderRadius: { 'DEFAULT': '0.5rem', 'lg': '0.5rem', 'xl': '0.75rem', 'full': '9999px' },
                },
            },
        }
    </script>
    <script src="index.js"></script>
</head>

<body class="font-body overflow-hidden">
    <!-- TopNavBar Shell -->
    <header class="fixed top-0 right-0 left-0 h-16 z-40 bg-white/80 dark:bg-white/80 backdrop-blur-md border-b border-outline-variant flex justify-between items-center px-8 w-auto">
        <div class="flex items-center gap-8 flex-1 min-w-0">
            <h2 class="text-lg font-black tracking-tighter text-on-secondary-container shrink-0">
                Chat IA
            </h2>
            <nav class="flex items-center gap-2 overflow-x-auto hide-scrollbar mask-gradient relative py-1 custom-scrollbar">
                <div class="flex items-center gap-6 whitespace-nowrap font-['Inter'] text-xs font-semibold px-2 uppercase models"></div>
            </nav>
        </div>
        <div class="w-12 h-12 rounded-2xl bg-white flex items-center justify-center text-violet-600 shadow-sm border border-slate-100 shrink-0 ml-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shield-user" aria-hidden="true"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path><path d="M6.376 18.91a6 6 0 0 1 11.249.003"></path><circle cx="12" cy="11" r="4"></circle></svg>
        </div>
    </header>
    <!-- Main Content Canvas -->
    <main class="ml-0 mt-16 h-[calc(100dvh-64px)] relative flex flex-col glow-accent">
        <!-- Message Stream Area -->
        <div class="flex-1 overflow-y-auto custom-scrollbar px-8 lg:px-24 py-12 space-y-10 messages">
        </div>
        <!-- Input Shell Area -->
        <div class="px-2 sm:px-12 lg:px-24 pb-8 pt-4 bg-gradient-to-t from-background via-background to-transparent">
            <div class="max-w-4xl mx-auto">
                <div class="bg-white rounded-2xl p-2 shadow-[0_8px_30px_rgba(0,0,0,0.08)] border border-outline-variant focus-within:border-primary focus-within:ring-4 focus-within:ring-primary/5 transition-all duration-500">
                    <form id="form_chat_api">
                        <div class="flex items-end gap-2 px-2 py-1">
                            <span class="material-symbols-outlined ml-2 mb-[11px] text-outline text-on-surface">article</span>
                            <textarea
                                name="textarea_prompt"
                                class="flex-1 bg-transparent border-none focus:ring-0 text-sm py-3 px-2 resize-none max-h-48 custom-scrollbar placeholder:text-outline text-on-surface font-medium"
                                placeholder="Escreva a questão a ser enviada para o modelo de IA" rows="1"
                                onkeydown="handle_enter(event)"></textarea>
                            <div class="flex items-center gap-1 mb-1">
                                <button
                                    type="submit"
                                    class="ml-2 w-10 h-10 rounded-xl bg-primary text-white flex items-center justify-center shadow-lg shadow-primary/20 hover:bg-primary-dim hover:scale-105 active:scale-95 transition-all">
                                    <span class="material-symbols-outlined"
                                        style="font-variation-settings: 'FILL' 1;">send</span>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="mt-3 group relative flex justify-center gap-4">
                    <p class="text-[10px] text-on-surface-variant/80 flex items-center gap-1.5 font-bold">
                        <span class="material-symbols-outlined text-[24px] text-primary">graph_8</span>
                        <span class="uppercase model"></span>
                    </p>
                    <p class="text-[10px] text-on-surface-variant/80 flex items-center gap-1.5 font-bold">
                        <span class="material-symbols-outlined text-[24px] text-primary">move_selection_up</span>
                        <span class="token">0 TOKENS ENVIADO</span>
                    </p>
                    <p class="text-[10px] text-on-surface-variant/80 flex items-center gap-1.5 font-bold">
                        <span class="material-symbols-outlined text-[24px] text-primary">move_selection_down</span>
                        <span class="token">0 TOKENS RECEBIDOS</span>
                    </p>
                    <span class="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 invisible opacity-0 group-hover:visible group-hover:opacity-100 transition-opacity duration-300 p-4 bg-white shadow-lg rounded-lg w-100 z-10 border border-gray-200 model_tooltip">
                    </span>
                </div>
            </div>
        </div>
    </main>
    <!-- Floating Background Decorative Elements -->
    <div class="fixed top-20 left-5"> 
      <p class="text-[10px] text-on-surface-variant/80 flex items-center gap-1 font-bold cursor-pointer" title="Limpar a conversa" onclick="messages_clear();">
        <span class="material-symbols-outlined text-[24px] text-primary">contract_delete</span>
        <span class="token">NOVO CHAT</span>
      </p>
    </div>
</body>

</html>

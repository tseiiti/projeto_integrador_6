<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AI Chat</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="index.css">
    <style type="text/tailwindcss">
      @theme {
        --color-primary: #4F46E5;
        --color-primary-dim: #4338CA;
        --color-primary-container: #E0E7FF;
        --color-on-primary: #FFFFFF;
        --color-on-primary-container: #1E1B4B;
        --color-secondary: #6366F1;
        --color-secondary-container: #EEF2FF;
        --color-on-secondary-container: #312E81;
        --color-surface: #F9FAFB;
        --color-surface-dim: #F3F4F6;
        --color-surface-bright: #FFFFFF;
        --color-surface-container-lowest: #FFFFFF;
        --color-surface-container-low: #F9FAFB;
        --color-surface-container: #F3F4F6;
        --color-surface-container-high: #E5E7EB;
        --color-surface-container-highest: #D1D5DB;
        --color-on-surface: #111827;
        --color-on-surface-variant: #4B5563;
        --color-outline: #9CA3AF;
        --color-outline-variant: #E5E7EB;
        --color-background: #F9FAFB;
        --color-on-background: #111827;
        --font-family-headline: Manrope, sans-serif;
        --font-family-body: Inter, sans-serif;
        --font-family-label: Inter, sans-serif;
      }
    </style>
    <script src="index.js"></script>
</head>

<body class="font-body overflow-hidden">
    <!-- TopNavBar Shell -->
    <header class="fixed top-0 right-0 left-0 h-16 z-40 bg-white/80 dark:bg-white/80 backdrop-blur-md border-b border-outline-variant flex justify-between items-center px-8 w-auto">
        <div class="flex items-center gap-8 flex-1 min-w-0">
            <h2 class="text-lg font-black tracking-tighter text-on-secondary-container shrink-0">
                Chat IA
            </h2>
            <nav class="flex items-center gap-2 overflow-x-auto hide-scrollbar mask-gradient relative py-1 custom-scrollbar">
                <div class="flex items-center gap-6 whitespace-nowrap font-['Inter'] text-xs font-semibold px-2 uppercase models"></div>
            </nav>
        </div>
        <div class="w-12 h-12 rounded-2xl bg-white flex items-center justify-center text-violet-600 shadow-sm border border-slate-100 shrink-0 ml-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shield-user" aria-hidden="true"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path><path d="M6.376 18.91a6 6 0 0 1 11.249.003"></path><circle cx="12" cy="11" r="4"></circle></svg>
        </div>
    </header>

    <!-- Main Content Canvas -->
    <main class="ml-0 mt-16 h-[calc(100dvh-64px)] relative flex flex-col glow-accent">
        
        <!-- Message Stream Area -->
        <div class="flex-1 overflow-y-auto custom-scrollbar p-4 sm:p-8 lg:px-24 space-y-8">
            <div class="messages"></div>
            <div class="messages-end"></div>
        </div>

        <!-- Shell Area -->
        <div class="px-2 sm:px-12 lg:px-24 py-4 bg-gradient-to-t from-background via-background to-transparent">
            <div class="max-w-4xl mx-auto">
                
                <!-- Input Area -->
                <div class="bg-white rounded-2xl px-2 shadow-[0_8px_30px_rgba(0,0,0,0.08)] border border-outline-variant focus-within:border-primary focus-within:ring-4 focus-within:ring-primary/5 transition-all duration-500">
                    <form id="form_chat_api">
                        <div class="flex items-center gap-2 px-2 py-1">
                            <span class="material-symbols-outlined ml-2 text-outline text-on-surface">article</span>
                            <textarea name="textarea_prompt"
                                class="flex-1 bg-transparent border-none focus:outline-none focus:ring-0 text-sm py-3 px-2 resize-none h-16 sm:h-11 max-h-48 custom-scrollbar placeholder:text-outline text-on-surface font-medium"
                                placeholder="Escreva a mensagem a ser enviada para o Assistente" rows="1"
                                onkeydown="handle_enter(event)"></textarea>
                            <div class="flex items-center gap-1 mb-0.5">
                                <button type="submit"
                                    class="ml-2 w-10 h-10 rounded-xl bg-primary text-white flex items-center justify-center shadow-lg shadow-primary/20 hover:bg-primary-dim hover:scale-105 active:scale-95 transition-all">
                                    <span class="material-symbols-outlined"
                                        style="font-variation-settings: 'FILL' 1;">send</span>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Info Area -->
                <div class="group relative flex justify-center gap-4 mt-2">
                    <!-- Model -->
                    <p class="text-[10px] text-on-surface-variant/80 flex items-center gap-1.5 font-bold">
                        <span class="material-symbols-outlined text-[24px] text-primary">graph_8</span>
                        <span class="uppercase model"></span>
                    </p>

                    <!-- Clear -->
                    <p class="text-[10px] text-on-surface-variant/80 flex items-center gap-1 font-bold cursor-pointer" 
                        onclick="messages_clear();" 
                        title="Limpar a conversa">
                        <span class="material-symbols-outlined text-[20px] text-primary">contract_delete</span>
                        <span class="token">NOVO CHAT</span>
                    </p>

                    <!-- Score -->
                    <div class="flex items-center gap-1 font-bold cursor-pointer" title="define a precisão do contexto">
                        <span class="material-symbols-outlined text-[24px] text-primary">scoreboard</span>
                        <span class="text-[10px] text-on-surface-variant/80 font-bold pr-2">SCORE:</span>
                        <input type="number" value="50" min="1" max="100"
                            class="w-full bg-transparent font-medium text-gray-500 text-sm border-none rounded-md py-1 transition duration-300 focus:outline-none focus:border-slate-400 hover:border-slate-300 score" />
                    </div>
                    
                    <!-- Tootip -->
                    <span class="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 invisible opacity-0 group-hover:visible group-hover:opacity-100 transition-opacity duration-300 p-4 bg-white shadow-lg rounded-lg w-100 z-10 border border-gray-200 model_tooltip">
                    </span>
                </div>
            </div>
        </div>
    </main>

    <!-- Floating Background Decorative Elements -->
    <div class="fixed top-16 left-5">
        <!-- File -->
        <div class="flex items-center justify-end mt-2 mb-1" title="Permite filtrar um determinado arquivo para geração do contexto">
            <span class="text-[12px] text-gray-400 pr-1">arquivo do contexto:</span>
            <select class="bg-transparent border-none focus:outline-none focus:ring-0 transition duration-300 ease placeholder:text-slate-400 cursor-pointer text-slate-700 text-sm p-0 filenames" name="filenames" onchange="resize_select()">
            </select>
        </div>
    </div>
    <div class="fixed bottom-36 right-3 sm:px-12 lg:px-24" title="Arquivo para contexto">
    </div>

    <!-- Alert Container -->
    <div id="toast" class="fixed top-24 px-4 py-3 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2 
            gap-2 rounded-lg bg-green-100 px-4 py-3 text-green-800 shadow-lg border border-green-300 transition-all duration-300
            transition-all duration-300 ease-in-out
            opacity-0 -translate-y-4 pointer-events-none">
        <span class="font-semibold">Successo</span>
        <p>Action completed successfully.</p>
    </div>
</body>
</html>
